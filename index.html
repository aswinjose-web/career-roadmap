<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protected — AI Era Career Pivot Roadmap</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0F172A 0%, #1E293B 60%, #0F3460 100%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  }
  .gate {
    background: #1E293B;
    border: 1px solid #334155;
    border-radius: 20px;
    padding: 48px 44px;
    width: 100%;
    max-width: 400px;
    text-align: center;
    box-shadow: 0 24px 64px rgba(0,0,0,.5);
  }
  .lock-icon {
    font-size: 44px;
    margin-bottom: 20px;
    display: block;
  }
  h1 {
    font-size: 20px;
    font-weight: 700;
    color: #F1F5F9;
    margin-bottom: 8px;
    letter-spacing: -.01em;
  }
  .subtitle {
    font-size: 13px;
    color: #64748B;
    margin-bottom: 32px;
    line-height: 1.5;
  }
  .field {
    position: relative;
    margin-bottom: 16px;
  }
  input[type="password"] {
    width: 100%;
    padding: 13px 16px;
    background: #0F172A;
    border: 1px solid #334155;
    border-radius: 10px;
    color: #F1F5F9;
    font-size: 15px;
    letter-spacing: .12em;
    outline: none;
    transition: border-color .15s;
  }
  input[type="password"]:focus { border-color: #3B82F6; }
  input[type="password"]::placeholder { letter-spacing: normal; color: #475569; }
  button {
    width: 100%;
    padding: 13px;
    background: #2563EB;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s, opacity .15s;
  }
  button:hover { background: #1D4ED8; }
  button:disabled { opacity: .5; cursor: not-allowed; }
  .error {
    margin-top: 14px;
    font-size: 13px;
    color: #F87171;
    display: none;
  }
  .error.show { display: block; }
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .6s linear infinite;
    margin-right: 6px;
    vertical-align: middle;
    display: none;
  }
  .spinner.show { display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

  <span class="lock-icon">🔐</span>
  <h1>Protected Content</h1>
  <p class="subtitle">This roadmap is password protected.<br>Enter your passphrase to continue.</p>
  <div class="field">
    <input type="password" id="pw" placeholder="Enter passphrase" autocomplete="current-password" autofocus />
  </div>
  <button id="btn" onclick="unlock()">
    <span class="spinner" id="spinner"></span>
    Unlock
  </button>
  <p class="error" id="err">Incorrect passphrase. Please try again.</p>
</div>

async function unlock() {
  const pw = document.getElementById('pw').value;
  if (!pw) return;

  const btn = document.getElementById('btn');
  const spinner = document.getElementById('spinner');
  const err = document.getElementById('err');

  btn.disabled = true;
  spinner.classList.add('show');
  err.classList.remove('show');

  try {
    const combined = Uint8Array.from(atob(ENCRYPTED_B64), c => c.charCodeAt(0));
    const salt = combined.slice(0, 16);
    const iv = combined.slice(16, 28);
    // remaining = ciphertext + authTag (WebCrypto handles the tag internally)
    const cipherWithTag = combined.slice(28);

    const keyMaterial = await crypto.subtle.importKey(
      'raw',
      new TextEncoder().encode(pw),
      'PBKDF2',
      false,
      ['deriveKey']
    );
    const key = await crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
      keyMaterial,
      { name: 'AES-GCM', length: 256 },
      false,
      ['decrypt']
    );

    const decrypted = await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv },
      key,
      cipherWithTag
    );

    const html = new TextDecoder().decode(decrypted);
    document.open();
    document.write(html);
    document.close();
  } catch (e) {
    err.classList.add('show');
    btn.disabled = false;
    spinner.classList.remove('show');
    document.getElementById('pw').value = '';
    document.getElementById('pw').focus();
  }
}

document.getElementById('pw').addEventListener('keydown', e => {
  if (e.key === 'Enter') unlock();
});
</script>
